      </header>
      <main class="container main-container">
        <section class="section-wrapper">
          <div class="section-content">
            <div class="section 1">
              <p>콘텐츠 첫 번째 01</p>

            <div class="section 2">

      <!-- <footer class="footer">
        <div class="content-inner">
          <div class="cotnent-foot">
            <address>구직활동을 위한 개인 포트폴리오 사이트이며, 비상업적 용도로만 사용됩니다.</address>

    </div>
    <script>
      const sectionWrapper = document.querySelector(".section-wrapper");
      const sectionContent = document.querySelector(".section-content");
      const section = document.querySelectorAll(".section");
      let count = 0
      for (let i = 0; i < section.length; i++) {
        section[i].addEventListener("wheel", WheelEvent);
      }
      function WheelEvent(event) {
        let y = event.wheelDelta;
        console.log(y);
        if (y < 0) {
          if (count < section.length - 1) {
            count++;
            console.log(count, '아래');
            sectionContent.style.top = `-${count}00%`;
          }
        } else {
          if (count > 0) {
            count--;
            console.log(count, '위');
            sectionContent.style.top = `-${count}00%`;
          }
        }
      }
      sectionContent.addEventListener("transitionend", () => {
        fixedHeader(count)
      });
      function fixedHeader(cur){
        if (cur == 6){
            return false
        }
        section[cur].classList.add('ani');
      }
    </script>
  </body>
