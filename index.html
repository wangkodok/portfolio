        position: fixed;
        display: block;
        opacity: 1;
        background: #ffffff;
        z-index: 100;
      }

      .loading.hide {
        position: static;
      }
    
      .loading .login-loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 101;
        width: auto;
      }

    <style>
      html {
        cursor: none;
      }
      a,
      button {
        cursor: none;
      }
      .cursor {
        position: fixed;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background-color: #f5f5f5;
        pointer-events: none;
        mix-blend-mode: difference;
        z-index: 9999;
        transition: all 0.1s none;
      }
    </style>
    <script>
      	var cursor = $(".cursor");
        $(window).mousemove(function(e) {
          cursor.css({
            top: e.clientY - cursor.height() / 2,
            left: e.clientX - cursor.width() / 2
          });
        });
    </script>

        <!-- HTML 스크롤 따라다니는 애니메이션 -->
        <div class="scrollbar-circle"></div>

        <style>
          /* CSS 스크롤 따라다니는 애니메이션 */
          .wrapper { overflow: hidden; }
          .container { position: relative; }
          div { -webkit-box-sizing: border-box; -moz-box-sizing: border-box; box-sizing: border-box; padding: 0; margin: 0; }
          a { text-decoration: none; }

          .scrollbar-circle {
            position: absolute; width: 200px; height: 200px; top: 0; left: 50px; background-color: #eee; border-radius: 400px; z-index: -9999; transform: translate(0, 0);
          }
          .scrollbar-square {
            position: absolute; width: 100px; height: 100px; top: -8px; right: 150px; background-color: #eee; border-radius: 150px; z-index: -9999; transform: translate(0, 0);
          }

          .dark .scrollbar-circle { background-color: #333; }
          .dark .scrollbar-square { background-color: #333; }
        </style>
        <script>
          // JQ 스크롤 따라다니는 애니메이션
          $(document).ready(function(){
            var currentPosition = parseInt( $(".scrollbar-circle").css("top") );
            var currentPosition = parseInt( $(".scrollbar-square").css("top") );
            
            $(window).scroll(function() {
              var position = $(window).scrollTop();
              $(".scrollbar-circle").stop().animate({ "top": position + currentPosition + "px" }, 1000);
              $(".scrollbar-square").stop().animate({ "top": position + currentPosition + "px" }, 2000);
            });
          });
        </script>

    <script>
      $(window).load(function () {
        $('.loading').show();
      });

      $(document).ready(function() {
        // 페이지 로딩 스피너
        $('.loading').hide();
        $('.loading').addClass('hide');
        $('.loading .login-loading').hide();

        // 페이지 로딩 시 애니메이션
        $(".animsition").animsition({
          inClass: 'fade-in',
          outClass: 'fade-out',
          inDuration: 1500,
          outDuration: 800,
          linkElement: '.animsition-link',
          // e.g. linkElement: 'a:not([target="_blank"]):not([href^="#"])'
          loading: true,
          loadingParentElement: 'body', //animsition wrapper element
          loadingClass: 'animsition-loading',
          loadingInner: '', // e.g '<img src="loading.svg" />'
          timeout: false,
          timeoutCountdown: 5000,
          onLoadEvent: true,
          browser: [ 'animation-duration', '-webkit-animation-duration'],
          // "browser" option allows you to disable the "animsition" in case the css property in the array is not supported by your browser.
          // The default setting is to disable the "animsition" in a browser that does not support "animation-duration".
          overlay : false,
          overlayClass : 'animsition-overlay-slide',
          overlayParentElement : 'body',
          transition: function(url){ window.location.href = url; }
        });

        // 다크 모드 클릭
        $(".dark-mode .btn").on("click", function() {
          if($("body").hasClass("light")) {
            // 다크 모드
            $("body").addClass("dark");
            $("body").removeClass("light");
            $(".dark-mode .dark").show();
            $(".dark-mode .light").hide();
          } else {
            // 라이트 모드
            $("body").addClass("light");
            $("body").removeClass("dark");
            $(".dark-mode .dark").hide();
            $(".dark-mode .light").show();
          }
        });
