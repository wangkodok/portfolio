    <style>
      /* 페이지 로딩 스피너 */
      .loading { width: 100%; height: 100%; top: 0; left: 0; position: fixed; display: block; opacity: 1; background: #ffffff; z-index: 100; }
      .loading.hide { position: static; }
      .loading .login-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 101; width: auto; }
    </style>
  </head>
  <body id="loading" class="light loading animsition" data-animsition-in-class="fade-in" data-animsition-in-duration="3000">
    <!-- 페이지 로딩 스피너 -->
    <img src="image/login.gif" class="login-loading" alt="login-loading">
    <script>
      $(window).load(function () {
        // 페이지 로딩 스피너 로드 시
        $('.loading').show();
      });

      $(document).ready(function() {
        // 페이지 로딩 스피너
        $('.loading').hide();
        $('.loading').addClass('hide');
        $('.loading .login-loading').hide();

        // 페이지 로딩 스피너 애니메이션
        $(".animsition").animsition({
          inClass: 'fade-in',
          outClass: 'fade-out',
          inDuration: 1500,
          outDuration: 800,
          linkElement: '.animsition-link',
          // e.g. linkElement: 'a:not([target="_blank"]):not([href^="#"])'
          loading: true,
          loadingParentElement: 'body', //animsition wrapper element
          loadingClass: 'animsition-loading',
          loadingInner: '', // e.g '<img src="loading.svg" />'
          timeout: false,
          timeoutCountdown: 5000,
          onLoadEvent: true,
          browser: [ 'animation-duration', '-webkit-animation-duration' ],
          // "browser" option allows you to disable the "animsition" in case the css property in the array is not supported by your browser.
          // The default setting is to disable the "animsition" in a browser that does not support "animation-duration".
          overlay: false,
          overlayClass: 'animsition-overlay-slide',
          overlayParentElement: 'body',
          transition: function(url){ window.location.href = url; },
        });
      });
    </script>

    <!-- 마우스 커서 -->
    <div class="cursor"></div>
    <style>
      /* 마우스 커서 */
      html { cursor: none; }
      a,button { cursor: none; }
      .cursor { position: fixed; width: 24px; height: 24px; border-radius: 50%; background-color: #f5f5f5; pointer-events: none; mix-blend-mode: difference; z-index: 9999; transition: all 0.1s none; }
    </style>
    <script>
      // 마우스 커서
      var cursor = $(".cursor");
      $(window).mousemove(function(e) {
        cursor.css({ top: e.clientY - cursor.height() / 2, left: e.clientX - cursor.width() / 2 });
      });
    </script>
